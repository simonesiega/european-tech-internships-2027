name: Bug report
description: Report a reproducible problem with the pipeline, website, or documentation.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Search existing issues first and never include credentials, cookies, private HTML, database files, or personal data.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Python pipeline or CLI
        - Website
        - Search or classification
        - Database or migrations
        - Docker or automation
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead? Include only sanitized errors.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Provide the smallest offline reproduction you can.
      placeholder: |
        1. Run ...
        2. Open ...
        3. Observe ...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Commit or version
      placeholder: Commit SHA, branch, or release
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python/Node/Bun versions, browser if relevant, and install method.
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Safety checks
      options:
        - label: I searched existing issues for duplicates.
          required: true
        - label: I removed credentials, cookies, personal data, private HTML, and database contents.
          required: true
        - label: This is not a security vulnerability requiring private disclosure.
          required: true
