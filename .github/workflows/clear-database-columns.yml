name: Clear database columns

on:
  workflow_dispatch:
    inputs:
      clear_industries:
        description: "Clear Industries for every job"
        required: false
        default: false
        type: boolean
      clear_employment_type:
        description: "Clear Employment type for every job"
        required: false
        default: false
        type: boolean
      clear_start_date:
        description: "Clear Start date for every job"
        required: false
        default: false
        type: boolean
      deploy_to_vps:
        description: "Deploy the cleaned database to the VPS"
        required: false
        default: true
        type: boolean

concurrency:
  group: internship-collection
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  clear-columns:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Require main branch and at least one column
        shell: bash
        run: |
          if [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "Database maintenance is permitted only from the main branch."
            exit 1
          fi
          if [ "${{ inputs.clear_industries }}" != "true" ] \
            && [ "${{ inputs.clear_employment_type }}" != "true" ] \
            && [ "${{ inputs.clear_start_date }}" != "true" ]; then
            echo "Select at least one column to clear."
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Configure VPS SSH access
        env:
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          VPS_SSH_KNOWN_HOSTS: ${{ secrets.VPS_SSH_KNOWN_HOSTS }}
        shell: bash
        run: |
          if [ -z "$VPS_SSH_PRIVATE_KEY" ] || [ -z "$VPS_SSH_KNOWN_HOSTS" ]; then
            echo "VPS SSH key and verified known_hosts entry are required."
            exit 1
          fi
          install -d -m 700 "$HOME/.ssh"
          printf '%s\n' "$VPS_SSH_PRIVATE_KEY" > "$HOME/.ssh/id_ed25519"
          printf '%s\n' "$VPS_SSH_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/id_ed25519" "$HOME/.ssh/known_hosts"

      - name: Download canonical database from VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ vars.VPS_SSH_PORT || '22' }}
          VPS_VOLUME: ${{ vars.VPS_DOCKER_VOLUME }}
        shell: bash
        run: |
          if [[ ! "$VPS_HOST" =~ ^[A-Za-z0-9.-]+$ ]] \
            || [[ ! "$VPS_USER" =~ ^[A-Za-z_][A-Za-z0-9._-]*$ ]] \
            || [[ ! "$VPS_PORT" =~ ^[0-9]{1,5}$ ]] \
            || [[ ! "$VPS_VOLUME" =~ ^[A-Za-z0-9_.-]+$ ]]; then
            echo "VPS configuration is missing or invalid."
            exit 1
          fi
          mkdir -p data backup
          ssh -i "$HOME/.ssh/id_ed25519" -p "$VPS_PORT" -o BatchMode=yes \
            "${VPS_USER}@${VPS_HOST}" \
            "docker run --rm -v '$VPS_VOLUME:/data:ro' alpine:3.22@sha256:14358309a308569c32bdc37e2e0e9694be33a9d99e68afb0f5ff33cc1f695dce cat /data/internships.db" \
            > data/internships.db
          cp data/internships.db backup/internships-before.db

      - name: Clear selected columns
        env:
          CLEAR_INDUSTRIES: ${{ inputs.clear_industries }}
          CLEAR_EMPLOYMENT_TYPE: ${{ inputs.clear_employment_type }}
          CLEAR_START_DATE: ${{ inputs.clear_start_date }}
        shell: bash
        run: |
          python - <<'PY'
          import os
          import sqlite3

          selected = {
              "industries": os.environ["CLEAR_INDUSTRIES"] == "true",
              "employment_type": os.environ["CLEAR_EMPLOYMENT_TYPE"] == "true",
              "start_date": os.environ["CLEAR_START_DATE"] == "true",
          }
          columns = [column for column, enabled in selected.items() if enabled]
          database = sqlite3.connect("data/internships.db")
          try:
              with database:
                  for column in columns:
                      affected = database.execute(
                          f"SELECT COUNT(*) FROM jobs WHERE {column} IS NOT NULL"
                      ).fetchone()[0]
                      database.execute(f"UPDATE jobs SET {column} = NULL")
                      print(f"Cleared {column} on {affected} rows")
              result = database.execute("PRAGMA integrity_check").fetchone()
              if result != ("ok",):
                  raise RuntimeError(f"SQLite integrity check failed: {result}")
          finally:
              database.close()
          PY

      - name: Upload before and after backups
        uses: actions/upload-artifact@v4
        with:
          name: cleared-database-${{ github.run_id }}
          retention-days: 30
          path: |
            backup/internships-before.db
            data/internships.db

      - name: Save cleaned canonical state
        uses: actions/cache/save@v4
        with:
          path: data/internships.db
          key: internship-db-${{ github.run_id }}

      - name: Deploy cleaned database to VPS
        if: inputs.deploy_to_vps
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ vars.VPS_SSH_PORT || '22' }}
          VPS_VOLUME: ${{ vars.VPS_DOCKER_VOLUME }}
        shell: bash
        run: |
          remote_file="/tmp/internships-${GITHUB_RUN_ID}.db"
          database_sha=$(sha256sum data/internships.db | cut -d ' ' -f 1)
          ssh_target="${VPS_USER}@${VPS_HOST}"
          ssh_options=(-i "$HOME/.ssh/id_ed25519" -p "$VPS_PORT" -o BatchMode=yes)

          scp -i "$HOME/.ssh/id_ed25519" -P "$VPS_PORT" -o BatchMode=yes \
            data/internships.db "${ssh_target}:${remote_file}"
          remote_sha=$(ssh "${ssh_options[@]}" "$ssh_target" \
            "sha256sum '$remote_file' | cut -d ' ' -f 1")
          if [ "$database_sha" != "$remote_sha" ]; then
            ssh "${ssh_options[@]}" "$ssh_target" "rm -f '$remote_file'"
            echo "Uploaded database checksum does not match."
            exit 1
          fi

          ssh "${ssh_options[@]}" "$ssh_target" \
            "VPS_VOLUME='$VPS_VOLUME' IMPORT_FILE='$remote_file' EXPECTED_SHA='$database_sha' bash -s" <<'REMOTE'
          set -euo pipefail
          trap 'rm -f "$IMPORT_FILE"' EXIT
          import_name=$(basename "$IMPORT_FILE")
          flock -n /tmp/internships-database-deploy.lock \
            docker run --rm --user 0 --entrypoint sh \
              -e IMPORT_NAME="$import_name" \
              -e EXPECTED_SHA="$EXPECTED_SHA" \
              -v "$VPS_VOLUME:/data" -v /tmp:/incoming:ro \
              alpine:3.22@sha256:14358309a308569c32bdc37e2e0e9694be33a9d99e68afb0f5ff33cc1f695dce -euc '
                test "$(sha256sum "/incoming/$IMPORT_NAME" | cut -d " " -f 1)" = "$EXPECTED_SHA"
                cp -p /data/internships.db /data/internships.db.previous
                cp "/incoming/$IMPORT_NAME" /data/.internships.db.new
                chown 10001:10001 /data/.internships.db.new
                chmod 640 /data/.internships.db.new
                rm -f /data/internships.db-wal /data/internships.db-shm /data/internships.db-journal
                mv /data/.internships.db.new /data/internships.db
              '
          REMOTE
