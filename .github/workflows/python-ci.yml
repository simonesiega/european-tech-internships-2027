name: Python CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.6"
          python-version: "3.12"
          enable-cache: true
      - name: Install frozen dependencies
        run: uv sync --frozen --dev
      - name: Check formatting
        run: uv run ruff format --check .
      - name: Lint Python
        run: uv run ruff check .

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.6"
          python-version: "3.12"
          enable-cache: true
      - name: Install frozen dependencies
        run: uv sync --frozen --dev
      - name: Check types
        run: uv run mypy src tests scripts
      - name: Run offline tests
        run: uv run pytest -m "not live"
      - name: Check migration consistency
        run: uv run python scripts/check_migrations.py
      - name: Check documentation links
        run: uv run python scripts/check_docs.py
      - name: Smoke-test migration and rendering
        env:
          OPPORTUNITIES_DATABASE_URL: sqlite:///data/ci.db
        run: |
          mkdir -p data
          uv run opportunities db-upgrade
          uv run opportunities render
          uv run opportunities validate
